<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Overview Concept 1 - Clean Split</title>
  <style>
    :root { --line:#cfd8d2; --bg:#f3f5f4; --card:#fff; --ink:#1f2522; --muted:#6c7771; --accent:#c73672; }
    body { margin:0; background:var(--bg); font-family:Inter,system-ui,sans-serif; padding:24px; }
    .layout { display:grid; grid-template-columns:2fr 1fr; gap:16px; align-items:stretch; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:20px; min-height:520px; display:grid; grid-template-rows:auto auto 1fr; }
    .head { display:flex; justify-content:space-between; align-items:center; }
    .title { margin:0; font-size:28px; font-weight:800; }
    .meta { margin-top:12px; padding:12px 0; border-top:1px solid var(--line); border-bottom:1px solid var(--line); display:grid; gap:10px; }
    .row { display:flex; justify-content:space-between; font-size:22px; }
    .k { color:var(--muted); } .v { font-weight:800; color:var(--ink); }
    .metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; align-content:start; margin-top:14px; }
    .metric { border:1px solid var(--line); border-radius:10px; padding:10px; }
    .metric b { display:block; color:var(--muted); font-size:13px; text-transform:uppercase; }
    .metric strong { font-size:28px; }
    .pin { border:1px solid var(--line); border-radius:8px; width:36px; height:36px; display:grid; place-items:center; }
    @media (max-width: 980px) {
      .layout { grid-template-columns:1fr; }
      .card { min-height:420px; }
      .metrics { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <section class="layout">
    <article class="card">
      <div class="head">
        <h2 class="title">Most Recent Model</h2>
      </div>
      <div class="meta">
        <div class="row"><span class="k">Name</span><span class="v">Thermal v1</span></div>
        <div class="row"><span class="k">Compared To</span><span class="v">Pinned Model</span></div>
      </div>
      <div class="metrics">
        <div class="metric"><b>mAP50</b><strong>NA</strong></div>
        <div class="metric"><b>Precision</b><strong>NA</strong></div>
        <div class="metric"><b>Recall</b><strong>NA</strong></div>
      </div>
    </article>

    <article class="card">
      <div class="head">
        <h2 class="title">Pinned Model</h2>
        <div class="pin">📌</div>
      </div>
      <div class="meta">
        <div class="row"><span class="k">Name</span><span class="v">Thermal v1</span></div>
      </div>
      <div class="metrics" style="grid-template-columns:1fr;">
        <div class="metric"><b>mAP50</b><strong>NA</strong></div>
        <div class="metric"><b>Precision</b><strong>NA</strong></div>
        <div class="metric"><b>Recall</b><strong>NA</strong></div>
      </div>
    </article>
  </section>
</body>
</html>
