<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Overview Concept 3 - Minimal Rails</title>
  <style>
    body { margin:0; padding:24px; background:#f1f4f2; font-family:Inter,system-ui,sans-serif; }
    .cols { display:grid; grid-template-columns:2fr 1fr; gap:18px; align-items:stretch; }
    .box { min-height:520px; background:#fff; border:1px solid #cfd8d2; border-radius:14px; padding:20px; display:grid; grid-template-rows:auto auto 1fr; }
    h3 { margin:0; font-size:26px; }
    .nameblock { margin-top:14px; border-left:4px solid #c73672; padding-left:12px; }
    .nameblock p { margin:4px 0; font-size:22px; }
    .m { margin-top:18px; display:grid; gap:14px; align-content:start; }
    .mrow { border-top:1px solid #dde5df; padding-top:10px; }
    .mrow label { display:block; font-size:13px; color:#6c7771; text-transform:uppercase; font-weight:700; }
    .mrow strong { font-size:24px; }
    @media (max-width: 980px) {
      .cols { grid-template-columns:1fr; }
      .box { min-height:420px; }
    }
  </style>
</head>
<body>
  <div class="cols">
    <article class="box">
      <h3>Most Recent Model</h3>
      <div class="nameblock">
        <p style="color:#6c7771;">Name</p>
        <p><b>Thermal-git 2</b></p>
      </div>
      <div class="m">
        <div class="mrow"><label>mAP50</label><strong>NA</strong></div>
        <div class="mrow"><label>Precision</label><strong>NA</strong></div>
        <div class="mrow"><label>Recall</label><strong>NA</strong></div>
      </div>
    </article>

    <article class="box">
      <h3>Pinned Model 📌</h3>
      <div class="nameblock">
        <p style="color:#6c7771;">Name</p>
        <p><b>Thermal v1</b></p>
      </div>
      <div class="m">
        <div class="mrow"><label>mAP50</label><strong>NA</strong></div>
        <div class="mrow"><label>Precision</label><strong>NA</strong></div>
        <div class="mrow"><label>Recall</label><strong>NA</strong></div>
      </div>
    </article>
  </div>
</body>
</html>
